spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/halqapay}
    username: ${DB_USER:halqapay}
    password: ${DB_PASS:halqapay}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:halqapay-dev-secret-change-in-production-min-256-bits}
    expiry-ms: 86400000

app:
  dti-threshold: 0.4
  min-circle-members: 2
  max-circle-members: 20
